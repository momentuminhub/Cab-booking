<html>
<head>
    <title>Cab Booking</title>
    <style>
        body { font-family: sans-serif; max-width: 400px; margin: 20px auto; padding: 20px; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; }
        .seat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .seat { padding: 15px; background: #ddd; text-align: center; cursor: pointer; border-radius: 5px; }
        .seat.selected { background: #ffdd00; border: 2px solid #000; }
    </style>
</head>
<body>

    <h2>Book Your Ride</h2>
    <input type="text" id="name" placeholder="Name">
    <input type="text" id="pickup" placeholder="Pickup Location">
    <input type="text" id="drop" placeholder="Drop Location">

    <label>Select Driver:</label>
    <select id="driverSelect">
        <option value="919103754740">Driver A</option>
        <option value="919123456789">Driver B</option>
    </select>

    <label>Select Seat:</label>
    <div class="seat-grid">
        <div class="seat" onclick="selectSeat(this)">Window Left</div>
        <div class="seat" onclick="selectSeat(this)">Window Right</div>
    </div>

    <button onclick="bookRide()">Confirm Booking</button>

    <script>
        // 1. Global variable to store the seat
        let selectedSeat = "";

        function selectSeat(element) {
            // Remove 'selected' class from all seats
            document.querySelectorAll('.seat').forEach(s => s.classList.remove('selected'));
            // Add to clicked seat
            element.classList.add('selected');
            selectedSeat = element.innerText.trim();
        }

        async function bookRide() {
            let name = document.getElementById('name').value;
            let pickup = document.getElementById('pickup').value;
            let drop = document.getElementById('drop').value;
            let driverPhone = document.getElementById('driverSelect').value;

            // Check if all fields are filled
            if (!name || !pickup || !drop || !selectedSeat) {
                alert("Please fill in all details and pick a seat!");
                return;
            }

            try {
                // Send to SheetDB
                await fetch('https://sheetdb.io/api/v1/k8f16g6apeoiw', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        data: [{ "Name": name, "Pickup": pickup, "Drop": drop, "Driver": driverPhone, "Seat": selectedSeat }]
                    })
                });

                // Redirect to WhatsApp
                let msg = `New Booking! Passenger: ${name}, Pickup: ${pickup}, Drop: ${drop}, Seat: ${selectedSeat}`;
                window.open(`https://wa.me/${driverPhone}?text=${encodeURIComponent(msg)}`, '_blank');
                
            } catch (error) {
                console.error("Error:", error);
                alert("Something went wrong. Check your connection.");
            }
        }
    </script>
</body>
</html>
