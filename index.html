<!DOCTYPE html>
<html>
<head>
    <title>Cab Booking</title>
</head>
<body>

    <h2>Book Your Ride</h2>
    <input type="text" id="name" placeholder="Name">
    <input type="text" id="pickup" placeholder="Pickup Location">
    <input type="text" id="drop" placeholder="Drop Location">

    <select id="driverSelect">
        <option value="919103754740">Driver A</option>
        <option value="919123456789">Driver B</option>
    </select>

    <div id="seat-container">
        <button onclick="setSeat('Window Left')">Window Left</button>
        <button onclick="setSeat('Window Right')">Window Right</button>
    </div>

    <button onclick="bookRide()">Confirm Booking</button>

    <script>
        let selectedSeat = "";

        function setSeat(seatName) {
            selectedSeat = seatName;
            alert("Seat selected: " + seatName);
        }

        async function bookRide() {
            let dataToSend = {
                "Name": document.getElementById('name').value,
                "Pickup": document.getElementById('pickup').value,
                "Drop": document.getElementById('drop').value,
                "Driver": document.getElementById('driverSelect').value,
                "Seat": selectedSeat
            };

            // Send to SheetDB
            let response = await fetch('https://sheetdb.io/api/v1/s9fmdpx1ku041', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ data: [dataToSend] })
            });

            if (response.ok) {
                alert("Success! Data sent to Spreadsheet.");
            } else {
                alert("Error: Check your API connection.");
            }
        }
    </script>
</body>
</html>
