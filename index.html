<!DOCTYPE html>
<html>
<head>
    <title>Cab Booking</title>
    <style>
        /* Light grey background for the whole page */
    body { font-family: sans-serif; max-width: 400px; margin: 20px auto; padding: 20px; background: #f4f4f4; }
    
    /* The white box that holds your form */
    .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    
    input, select, button { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
    
    /* Makes the inputs glow yellow when you tap them */
    input:focus, select:focus { border: 2px solid #ffdd00; outline: none; }
    
    .seat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
    .seat { padding: 15px; background: #eee; text-align: center; cursor: pointer; border-radius: 8px; font-weight: bold; transition: 0.3s; }
    .seat.selected { background: #ffdd00; border: 2px solid #000; }
    
    button { background-color: #000; color: white; font-weight: bold; cursor: pointer; border: none; transition: 0.3s; }
    button:hover { background-color: #333; }
    button:disabled { background-color: #aaa; }
    </style>
</head>
<body>

    <h2>Book Your Ride</h2>
    <input type="text" id="name" placeholder="Name">
    <input type="text" id="pickup" placeholder="Pickup Location">
    <input type="text" id="drop" placeholder="Drop Location">

    <label>Select Driver:</label>
    <select id="driverSelect">
        <option value="919103754740">Driver A</option>
        <option value="919123456789">Driver B</option>
    </select>

    <label>Select Seat:</label>
    <div class="seat-grid">
        <div class="seat" onclick="selectSeat(this)">Window Left</div>
        <div class="seat" onclick="selectSeat(this)">Window Right</div>
    </div>

    <button onclick="bookRide()">Confirm Booking</button>

    <script>
        let selectedSeat = "";

        function selectSeat(element) {
            document.querySelectorAll('.seat').forEach(s => s.classList.remove('selected'));
            element.classList.add('selected');
            selectedSeat = element.innerText.trim();
        }

        async function bookRide() {
            let name = document.getElementById('name').value;
            let pickup = document.getElementById('pickup').value;
            let drop = document.getElementById('drop').value;
            let driverPhone = document.getElementById('driverSelect').value;
            let seat = selectedSeat;

            if (!name || !pickup || !drop || !seat) {
                alert("Please fill in all details and pick a seat!");
                return;
            }

            try {
                // Send to SheetDB
                await fetch('https://sheetdb.io/api/v1/s9fmdpx1ku041', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        data: [{ "Name": name, "Pickup": pickup, "Drop": drop, "Driver": driverPhone, "Seat": seat }]
                    })
                });

                // Redirect to WhatsApp
                let msg = `New Booking! Passenger: ${name}, Pickup: ${pickup}, Drop: ${drop}, Seat: ${seat}`;
                window.open(`https://wa.me/${driverPhone}?text=${encodeURIComponent(msg)}`, '_blank');
                
            } catch (error) {
                alert("Error: " + error.message);
            }
        }
    </script>
</body>
</html>
